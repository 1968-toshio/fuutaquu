<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>緊急連絡先情報 / Emergency Info</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; color: #333; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid #dc3545; }
        h1 { color: #dc3545; font-size: 22px; text-align: center; margin-bottom: 20px; }
        .section { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .label { font-size: 12px; color: #666; font-weight: bold; }
        .value { font-size: 16px; margin-top: 3px; font-weight: bold; }
        .btn-call { display: block; background: #dc3545; color: white; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚨 緊急連絡先 / EMERGENCY INFO</h1>
    
    <div class="section">
        <div class="label">氏名 (Name)</div>
        <div class="value">南谷 俊男 (Toshio Minamitani)</div>
    </div>
    
    <div class="section">
        <div class="label">緊急連絡先 (Emergency Contact)</div>
        <div class="value">妻：南谷 真喜</div>
    </div>

    <a href="tel:07028326992" class="btn-call">緊急連絡先に電話する</a>
    
    <div class="section" style="margin-top: 20px;">
        <div class="label">血液型 (Blood Type)</div>
        <div class="value">O型 (Rh+)</div>
    </div>
    
    <div class="section">
        <div class="label">かかりつけ医・持病 (Medical Memo)</div>
        <div class="value">兵庫中央病院 / パーキンソン病　不整脈　パーキンソン病薬を服用中。</div>
    </div>
</div>

</body>
</html>
