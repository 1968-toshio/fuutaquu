<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>緊急連絡先情報 / Emergency Info</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; color: #333; padding: 20px; display: flex; justify-content: center; }
        /* cardの縦幅を固定せず、中身に合わせて自動で広がるように（min-height）しています */
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid #dc3545; min-height: 450px; }
        h1 { color: #dc3545; font-size: 22px; text-align: center; margin-bottom: 20px; margin-top: 10px; }
        
        /* 写真用スペースの設定：周りに十分な余白を作ります */
        .photo-container { text-align: center; margin-bottom: 20px; margin-top: 10px; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #dc3545; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .section { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .label { font-size: 12px; color: #666; font-weight: bold; }
        .value { font-size: 16px; margin-top: 3px; font-weight: bold; }
        .btn-call { display: block; background: #dc3545; color: white; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; margin-bottom: 15px; }
        .pdf-link { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: underline; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚨 緊急連絡先 / EMERGENCY INFO</h1>
    
    <!-- 📸 写真スペース（ここから） -->
    <div class="photo-container">
        <!-- 「my-photo.jpg」の部分を、アップロードした写真のファイル名に書き換えてください -->
        <img src="顔写真.jpg" alt="顔写真" class="profile-img">
    </div>
    <!-- 📸 写真スペース（ここまで） -->
    
    <div class="section">
        <div class="label">氏名 (Name)</div>
        <div class="value">南谷 俊男 (Toshio Minamitani)</div>
    </div>
    
    <div class="section">
        <div class="label">緊急連絡先 (Emergency Contact)</div>
        <div class="value">妻：南谷 俊男</div>
    </div>

    <a href="tel:07028326992" class="btn-call">緊急連絡先に電話する</a>
    
    <!-- 📄 PDFリンク（先ほど404が出た部分。ファイル名を合わせてください） -->
    <a href="medical-info.pdf" target="_blank" class="pdf-link">📄 詳細な医療情報を表示 (PDF)</a>
    <div class="section" style="margin-top: 20px;">
        <div class="label">血液型 (Blood Type)</div>
        <div class="value">O 型 (Rh+)</div>
    </div>
    
    <div class="section">
        <div class="label">かかりつけ医・持病 (Medical Memo)</div>
        <div class="value">兵庫中央病院病院 /パーキンソン病薬を服用中。不整脈（2段脈）あり。</div>
    </div>
</div>

</body>
</html>
